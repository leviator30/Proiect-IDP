services:
  mongodb:
    image: mongo:latest
    container_name: factorio-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: factorio-db-ui
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin  # Change this
      ME_CONFIG_BASICAUTH_PASSWORD: admin  # Change this

volumes:
  mongo-data: