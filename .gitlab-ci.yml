stages:
  - build
  - test

build_auth:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t factorio-auth:latest ./auth-service
    - echo "Imaginea pentru Auth Service a fost construită cu succes!"

test_auth:
  stage: test
  image: python:3.9
  script:
    - cd auth-service
    - pip install -r requirements.txt
    - pip install pytest
    - pytest